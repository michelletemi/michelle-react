name: prettier
on: pull_request
jobs:  
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Run Prettier check
        run: npm run format:check
      - name: Build
        run: npm run build